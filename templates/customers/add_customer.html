{% extends "base.html" %}

{% block content %}

<h2>

Add Customer

</h2>

<hr>

<form method="POST">

<div class="row">

<div class="col-md-6">

<label>

Customer ID

</label>

<input

type="number"

name="customer_id"

class="form-control"

required>

</div>

<div class="col-md-6">

<label>

Customer Name

</label>

<input

type="text"

name="name"

class="form-control"

required>

</div>

</div>

<br>

<div class="row">

<div class="col-md-6">

<label>

Phone

</label>

<input

type="text"

name="phone"

class="form-control"

required>

</div>

<div class="col-md-6">

<label>

Email

</label>

<input

type="email"

name="email"

class="form-control"

required>

</div>

</div>

<br>

<div class="row">

<div class="col-md-6">

<label>

Balance

</label>

<input

type="number"

step="0.01"

name="balance"

class="form-control"

required>

</div>

</div>

<br>

<button

class="btn btn-success">

Save Customer

</button>

<a

href="/customers"

class="btn btn-secondary">

Cancel

</a>

</form>

{% endblock %}
