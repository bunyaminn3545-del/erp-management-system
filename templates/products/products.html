{% extends "base.html" %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">

    <h2>Products</h2>

    <a href="/products/add" class="btn btn-success">
        Add Product
    </a>

</div>

<form method="GET" class="row mb-3">

    <div class="col-md-10">

        <input
            type="text"
            name="search"
            class="form-control"
            placeholder="Search product..."
            value="{{ keyword }}">

    </div>

    <div class="col-md-2">

        <button
            type="submit"
            class="btn btn-primary w-100">

            Search

        </button>

    </div>

</form>

<table class="table table-bordered table-hover shadow">

    <thead class="table-dark">

        <tr>

            <th>Product ID</th>
            <th>Product Name</th>
            <th>Price</th>
            <th>Stock</th>
            <th width="180">Operations</th>

        </tr>

    </thead>

    <tbody>

    {% for product in products %}

        <tr>

            <td>{{ product.product_id }}</td>

            <td>{{ product.name }}</td>

            <td>{{ product.price }}</td>

            <td>{{ product.stock }}</td>

            <td>

                <a
                    href="/products/edit/{{ product.product_id }}"
                    class="btn btn-warning btn-sm">

                    Edit

                </a>

                <a
                    href="/products/delete/{{ product.product_id }}"
                    class="btn btn-danger btn-sm"
                    onclick="return confirm('Are you sure you want to delete this product?');">

                    Delete

                </a>

            </td>

        </tr>

    {% else %}

        <tr>

            <td colspan="5" class="text-center">

                No products found.

            </td>

        </tr>

    {% endfor %}

    </tbody>

</table>

{% endblock %}
