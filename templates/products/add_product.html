{% extends "base.html" %}

{% block content %}

<h2>

Add Product

</h2>

<hr>

<form method="POST">

<div class="row">

<div class="col-md-6">

<label>

Product ID

</label>

<input
type="number"
name="product_id"
class="form-control"
required>

</div>

<div class="col-md-6">

<label>

Product Name

</label>

<input
type="text"
name="name"
class="form-control"
required>

</div>

</div>

<br>

<div class="row">

<div class="col-md-6">

<label>

Price

</label>

<input
type="number"
step="0.01"
name="price"
class="form-control"
required>

</div>

<div class="col-md-6">

<label>

Stock

</label>

<input
type="number"
name="stock"
class="form-control"
required>

</div>

</div>

<br>

<button
class="btn btn-success">

Save Product

</button>

<a
href="/products"
class="btn btn-secondary">

Cancel

</a>

</form>

{% endblock %}
