{% extends "base.html" %}

{% block content %}

<h2>

Edit Product

</h2>

<hr>

<form method="POST">

<div class="row">

<div class="col-md-6">

<label>

Product ID

</label>

<input
type="number"
class="form-control"
value="{{ product.product_id }}"
readonly>

</div>

<div class="col-md-6">

<label>

Product Name

</label>

<input
type="text"
name="name"
value="{{ product.name }}"
class="form-control">

</div>

</div>

<br>

<div class="row">

<div class="col-md-6">

<label>

Price

</label>

<input
type="number"
step="0.01"
name="price"
value="{{ product.price }}"
class="form-control">

</div>

<div class="col-md-6">

<label>

Stock

</label>

<input
type="number"
name="stock"
value="{{ product.stock }}"
class="form-control">

</div>

</div>

<br>

<button
class="btn btn-primary">

Update Product

</button>

<a
href="/products"
class="btn btn-secondary">

Cancel

</a>

</form>

{% endblock %}
