<!DOCTYPE html>

<html>

<head>

Register

</title>

<link

rel="stylesheet">

</head>

<body
class="bg-light">

<div
class="container">

<div
class="row justify-content-center">

class="col-md-5">

<div
class="card mt-5 shadow">

class="card-header bg-success text-white">

<h3>

Create User

</h3>

</div>

<div
class="card-body">

<form
method="POST">

<div
class="mb-3">

<label>

Username

</label>

<input
type="text"
name="username"
class="form-control">

</div>

<div
class="mb-3">

<label>

Password

</label>

<input
type="password"
name="password"
class="form-control">

</div>

<button
class="btn btn-success w-100">

Register

</button>

</form>

</div>

</div>

</div>

</div>

</div>

</html>
